# Example: STT sidecar with persistent model cache.
# See docs/shared-stt-http-service.md

services:
  stt:
    image: ${STT_IMAGE:-moonshine-stt:latest}
    build: .
    ports:
      - "${STT_HOST_PORT:-8080}:8080"
    environment:
      MOONSHINE_LANGUAGE: ${MOONSHINE_LANGUAGE:-en}
      PORT: "8080"
      MOONSHINE_VOICE_CACHE: /data/moonshine_voice
    volumes:
      - moonshine-stt-models:/data/moonshine_voice

volumes:
  moonshine-stt-models:
